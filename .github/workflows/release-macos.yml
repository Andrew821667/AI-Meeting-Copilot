name: Release macOS

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Версия релиза (например 1.0.0)"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Backend tests
        run: |
          PYTHONPATH=backend pytest -q backend/tests

      - name: Build app bundle
        run: |
          chmod +x tools/build_app_bundle.sh tools/package_backend.sh
          ./tools/build_app_bundle.sh --output-dir dist

      - name: Archive unsigned app
        run: |
          ditto -c -k --keepParent dist/AIMeetingCopilot.app dist/AIMeetingCopilot-unsigned.zip

      - name: Upload unsigned artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIMeetingCopilot-unsigned
          path: dist/AIMeetingCopilot-unsigned.zip

      - name: Import signing certificate
        if: ${{ secrets.MACOS_CERT_P12_BASE64 != '' && secrets.MACOS_CERT_PASSWORD != '' }}
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Prepare notary API key
        if: ${{ secrets.APPLE_NOTARY_KEY_BASE64 != '' && secrets.APPLE_NOTARY_KEY_ID != '' && secrets.APPLE_NOTARY_ISSUER_ID != '' }}
        env:
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
        run: |
          echo "$APPLE_NOTARY_KEY_BASE64" | base64 --decode > /tmp/AuthKey.p8
          chmod 600 /tmp/AuthKey.p8

      - name: Sign and notarize app
        if: ${{ secrets.MACOS_CODESIGN_IDENTITY != '' && secrets.APPLE_NOTARY_KEY_BASE64 != '' && secrets.APPLE_NOTARY_KEY_ID != '' && secrets.APPLE_NOTARY_ISSUER_ID != '' }}
        env:
          AIMC_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          AIMC_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          AIMC_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          AIMC_NOTARY_KEY_PATH: /tmp/AuthKey.p8
        run: |
          chmod +x tools/release_macos.sh
          ./tools/release_macos.sh dist/AIMeetingCopilot.app

      - name: Archive signed app
        if: ${{ secrets.MACOS_CODESIGN_IDENTITY != '' && secrets.APPLE_NOTARY_KEY_BASE64 != '' && secrets.APPLE_NOTARY_KEY_ID != '' && secrets.APPLE_NOTARY_ISSUER_ID != '' }}
        run: |
          ditto -c -k --keepParent dist/AIMeetingCopilot.app dist/AIMeetingCopilot-signed.zip

      - name: Upload signed artifact
        if: ${{ secrets.MACOS_CODESIGN_IDENTITY != '' && secrets.APPLE_NOTARY_KEY_BASE64 != '' && secrets.APPLE_NOTARY_KEY_ID != '' && secrets.APPLE_NOTARY_ISSUER_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: AIMeetingCopilot-signed
          path: dist/AIMeetingCopilot-signed.zip
